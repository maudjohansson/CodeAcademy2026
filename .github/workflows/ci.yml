name: codeacademy-2026-idempotweet

on:
  pull_request:
    paths:
      - '1-DevOps/idempotweet/**'
    branches:
      - main
  workflow_call:
    branches:
      - main

  jobs:
    defaults:
      run:
        working-directory: defaults.run.working-directory || './1-DevOps/idempotweet'   
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
          with:
            fetch-depth: 2
            ref: ${{ github.event.workflow_run.head_sha || github.sha }}
        - name: Setup node
          uses: actions/setup-node@v3
          with:
            node-version: '20'
            cache: 'yarn'
        - name: Activate corepack 
          working-directory: './'
          run: corepack enable
        - name: Install dependencies
          run: yarn install --immutable
        - name: Run tests
          run: yarn test
        - name: Test coverage
          run: yarn test:coverage



  


